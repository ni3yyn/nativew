name: Build Release AAB

on:
  workflow_dispatch: # Allows manual run
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - '.gitignore'

jobs:
  build:
    name: Build Android AAB
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout Code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Setup Java
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Cache Gradle
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 4. Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      # 5. 🔧 FIX: Install ts-node and set up TypeScript support MULTIPLE WAYS
      - name: Install ts-node and typescript
        run: |
          npm install -g ts-node typescript
          echo "Node version: $(node -v)"
          echo "ts-node version: $(ts-node -v)"

      # 6. 🔧 FIX: Set NODE_OPTIONS in multiple ways
      - name: Set NODE_OPTIONS for TypeScript
        run: |
          echo "NODE_OPTIONS=--loader ts-node/esm" >> $GITHUB_ENV
          echo "NODE_OPTIONS=--loader ts-node/esm" >> $GITHUB_PATH
          echo "export NODE_OPTIONS=--loader ts-node/esm" >> ~/.bashrc

      # 7. 🔧 FIX: Create .npmrc to ensure ts-node is used
      - name: Configure npm for TypeScript
        run: |
          echo "engine-strict=true" >> .npmrc
          echo "scripts-prepend-node-path=true" >> .npmrc

      # 8. Cache Yarn
      - name: Get yarn cache directory path
        id: yarn-cache-dir-path
        run: echo "dir=$(yarn cache dir)" >> $GITHUB_OUTPUT

      - name: Cache Yarn
        uses: actions/cache@v4
        with:
          path: ${{ steps.yarn-cache-dir-path.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      # 9. Install Dependencies with Yarn
      - name: Install Dependencies
        run: |
          yarn install --frozen-lockfile

      # 10. 🔧 FIX: Pre-build Expo config with explicit Node options
      - name: Pre-build Expo config
        run: |
          export NODE_OPTIONS="--loader ts-node/esm"
          npx expo config --platform android
        env:
          NODE_OPTIONS: "--loader ts-node/esm"

      # 11. Decode Keystore from GitHub Secrets
      - name: Decode Keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/release.keystore

      # 12. Build the Signed AAB with explicit Node options
      - name: Build AAB
        working-directory: android
        env:
          MYAPP_UPLOAD_STORE_FILE: release.keystore
          MYAPP_UPLOAD_STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          MYAPP_UPLOAD_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          MYAPP_UPLOAD_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=1024m"
          NODE_OPTIONS: "--loader ts-node/esm"
        run: ./gradlew bundleRelease

      # 13. Upload AAB as Artifact
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: wathiq-release-bundle
          path: android/app/build/outputs/bundle/release/app-release.aab